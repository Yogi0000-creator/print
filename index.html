<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Print Service</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #74ebd5, #9face6); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: #ffffff; width: 100%; max-width: 450px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); text-align: center; }
        .logo { font-size: 50px; margin-bottom: 10px; }
        h2 { color: #333; margin-bottom: 5px; font-weight: 700; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }
        
        .upload-box { border: 2px dashed #9face6; padding: 30px 20px; border-radius: 15px; background: #f9f9ff; cursor: pointer; position: relative; transition: all 0.3s ease; }
        .upload-box:hover { border-color: #4a00e0; background: #f1f1ff; }
        .upload-box input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .upload-icon { font-size: 40px; color: #888; margin-bottom: 10px; }
        .file-name { font-size: 14px; color: #4a00e0; font-weight: 600; margin-top: 10px; word-break: break-all; }
        
        .btn-print { display: block; width: 100%; background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; border: none; padding: 15px; margin-top: 25px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(0, 242, 254, 0.3); transition: all 0.3s ease; }
        .btn-print:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 242, 254, 0.4); }
        .btn-print:disabled { background: #cccccc; box-shadow: none; cursor: not-allowed; transform: none; }
        
        #status { margin-top: 15px; font-size: 14px; font-weight: 600; }
        .success { color: #28a745; }
        .error { color: #dc3545; }
        .loading { color: #ffc107; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

<div class="container">
    <div class="logo">🖨️</div>
    <h2>Ambition Mart</h2>
    <p>Upload your document</p>
    
    <div class="upload-box">
        <div class="upload-icon">📁</div>
        <span id="uploadText" style="color: #555; font-weight: 500;">Document ya Photo Select Karein</span>
        <input type="file" id="fileInput" accept=".pdf, .png, .jpg, .jpeg" onchange="displayFileName()">
        <div id="fileNameDisplay" class="file-name"></div>
    </div>
    
    <button id="printBtn" class="btn-print" onclick="uploadAndPrint()" disabled>Upload & Print 🚀</button>
    
    <p id="status"></p>
</div>

<script>
    // Firebase Config Details (Maine bas URL ke extra slash ko theek kiya h)
    const firebaseConfig = {
        apiKey: "AIzaSy...", // Teri asli key jo pehle thi
        authDomain: "qrprint-45949.firebaseapp.com",
        databaseURL: "https://qrprint-45949-default-rtdb.firebaseio.com/",
        projectId: "qrprint-45949",
        storageBucket: "qrprint-45949.appspot.com",
        messagingSenderId: "...",
        appId: "..."
    };
    
    // Firebase Initialize
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const database = firebase.database();

    // Teri Google Web App Link
    const googleWebAppUrl = "https://script.google.com/macros/s/AKfycbyReUP0O-3WK3QpcVQZj2oIVblLlC113V3MO_m92uIKrxgyQg5OKi6Qoaid0U2v97Oj/exec";

    // File select hone par naam dikhana
    function displayFileName() {
        const fileInput = document.getElementById('fileInput');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const uploadText = document.getElementById('uploadText');
        const printBtn = document.getElementById('printBtn');
        
        if (fileInput.files.length > 0) {
            fileNameDisplay.innerText = fileInput.files[0].name;
            uploadText.innerText = "File Change Karein";
            printBtn.disabled = false;
        } else {
            fileNameDisplay.innerText = "";
            uploadText.innerText = "Document ya Photo Select Karein";
            printBtn.disabled = true;
        }
    }

    // Main upload logic
    function uploadAndPrint() {
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');
        const printBtn = document.getElementById('printBtn');
        
        if (fileInput.files.length === 0) return;
        
        const file = fileInput.files[0];
        status.className = "loading";
        status.innerText = "Google Drive par file upload ho rahi hai... ⏳";
        printBtn.disabled = true;
        
        const reader = new FileReader();
        reader.onload = function(e) {
            const base64Str = e.target.result.split(',')[1];
            
            fetch(googleWebAppUrl, {
                method: 'POST',
                body: JSON.stringify({
                    base64: base64Str,
                    fileName: file.name,
                    mimeType: file.type
                })
            })
            .then(res => res.json())
            .then(response => {
                if(response.status === "success") {
                    status.innerText = "Drive par upload ho gayi! Ab print command bheji ja rahi hai... 🚀";
                    
                    const orderId = "order_" + Date.now();
                    database.ref('orders/' + orderId).set({
                        file_name: file.name,
                        file_url: response.file_url,
                        status: "Pending"
                    }, (error) => {
                        if (error) {
                            status.className = "error";
                            status.innerText = "Database entry failed: " + error.message;
                            printBtn.disabled = false;
                        } else {
                            status.className = "success";
                            status.innerText = "Success! Aapka document automatic print ho raha hai. 🎉";
                            fileInput.value = "";
                            document.getElementById('fileNameDisplay').innerText = "";
                            document.getElementById('uploadText').innerText = "Document ya Photo Select Karein";
                        }
                    });
                } else {
                    status.className = "error";
                    status.innerText = "Upload fail: " + response.message;
                    printBtn.disabled = false;
                }
            })
            .catch(err => {
                status.className = "error";
                status.innerText = "Server error: " + err.toString();
                printBtn.disabled = false;
            });
        };
        reader.readAsDataURL(file);
    }
</script>

</body>
</html>
